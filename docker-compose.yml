services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: poe2-backend
    restart: unless-stopped
    ports:
      - "3001:3001"
    env_file:
      - .env
    volumes:
      # La base de datos persiste fuera del contenedor
      - ./backend/data:/app/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/health"]
      interval: 30s
      timeout: 5s
      retries: 3